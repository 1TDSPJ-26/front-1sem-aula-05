<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
    <link rel="stylesheet" href="./css/main.css" />
 
    <script src="./js/script.js" defer></script>

    <title>ESPORTES TOTAIS - LOGIN</title>
  </head>
 
  <body>
    <header class="cabecalho">
      <nav class="cabecalho__nav">
        <ul class="cabecalho__ul">
          <li class="cabecalho__li cabecalho__li--active">
            <a class="cabecalho__a cabecalho__a--active" href="./index.html"
              >Home</a
            >
          </li>
        </ul>
      </nav>
    </header>
 
    <main class="conteudo">
      <section class="hero">
        <div class="hero__container">
          <h1 class="hero__title">CONTROLE DE ACESSO</h1>
 
          <div>
            <h2 id="teste">TESTE</h2>
            <img id="avatar-user">
          </div>

          <form action="/action_page.php" method="get">
            <fieldset>
                <div>
                    <label for="idEmail" class="hero__label">Email:</label>
                    <input type="email" id="idEmail" name="idEmail" placeholder="Digite seu email" minlength="7" maxlength="50" required>
                </div>
                <div>
                    <label for="idSenha" class="hero__label">Senha:</label>
                    <input type="password" id="idSenha" name="idSenha" placeholder="Digite sua senha" minlength="6" maxlength="20" required>
                </div>
                <div>
                    <input type="submit" id="idSubmit" name="idSubmit" value="Entrar">
                </div>
            </fieldset>
          </form>
 
          <span>Ainda não tem conta?</span>
          <a aria-label="Para criar sua conta." class="hero__btn" href="./cadastro.html">Clique Aqui</a>
        </div>
      </section>
    </main>
 
    <footer class="rodape">
      <p class="rodape__text">
        Alexandre C. de Jesus - Todos os direitos reservados - &copy; - 2026
      </p>
    </footer>
 
 
 
  </body>
</html>
