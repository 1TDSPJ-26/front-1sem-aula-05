<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./css/main.css" />

    <script src='./js/script.js'></script>

    <title>ESPORTES TOTAIS - LOGIN</title>
  </head>

  <body>
    <header class="cabecalho">
      <nav class="cabecalho__nav">
        <ul class="cabecalho__ul">
          <li class="cabecalho__li cabecalho__li--active">
            <a class="cabecalho__a cabecalho__a--active" href="./index.html"
              >Home</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main class="conteudo">
      <section class="hero">
        <div class="hero__container">
          <h1 class="hero__title">CONTROLE DE ACESSO</h1>

          <form action="" method="">
            <fieldset>
              <div>
                <label for="idEmail">Email</label>
                <input
                  type="email" id="idEmail" name="email" placeholder="Digite seu email" minlength="7" maxlength="150" required/>
                </div>
                <div>
                <label for="idSenha">Senha</label>
                <input
                  type="password" id="idSenha" name="senha" placeholder="Digite sua senha" minlength="5" maxlength="30" required/>
              </div>
              <div>
                <button type="submit" id="btnEntrar">Entrar</button>
              </div>
            </fieldset>
          </form>

          <span>Ainda não tem conta?</span>
          <a
            aria-label="Para criar sua conta."
            class="hero__btn"
            href="./cadastro.html"
            >Clique Aqui</a
          >
        </div>
      </section>
    </main>

    <footer class="rodape">
      <p class="rodape__text">
